[PATHS]
SOURCE_DIR = ./source
DESTINATION_DIR = ./destination
LOG_DIR = ./logs
TRACKER_FILE = ./migration_tracker.csv
STATUS_UPDATE_TRACKER_FILE = ./status_update_tracker.csv

[TARGET]
TARGET_HOST = 172.16.148.21
TARGET_PROTOCOL = https
TARGET_PORT = 
CREATE_USER_ENDPOINT = /scim/Users
DELETE_USER_ENDPOINT = /scim/Users

[BATCH]
BATCH_PREFIX = User_Migration_Batch_
BATCH_EXTENSION = .csv

[VALIDATION]
EXPECTED_HEADERS = firstname,lastname,loginid,locationid,telno,emailid,sex,profileid,corporateid,category,selfauthorizationlimit,selfauthtransaction,nationalidcardorpassport,identificationtype,uuid,effectivefrom,modifiedby,modifiedon,checkedby,checkedon,Roleid,FullName,isApprovalRequired,accountStatus,lastPasswordChangeOn,isCorpUser,digestedPassword,forcePasswordChange,Remarks,originSystem,noOfOTPAttempts,noOfOtpGenerates,lockedUser,lockedTimestamp,lockedReason,noOfLoginAttempts

MANDATORY_FIELDS = firstname,lastname,loginid,telno,emailid,corporateid,nationalidcardorpassport,identificationtype,effectivefrom,modifiedby,modifiedon,isApprovalRequired,accountStatus,lastPasswordChangeOn,isCorpUser,digestedPassword,forcePasswordChange,Remarks,originSystem,noOfLoginAttempts

TRUE_VALUES = true
FALSE_VALUES = false

[AUTH]
AUTH_TYPE = BASIC
USERNAME = scimadmin
PASSWORD = Passw0rd

[EXECUTION]
MOCK_MODE = false

[HTTP]
REQUEST_TIMEOUT_SECONDS = 30
VERIFY_SSL = false

[DUPLICATE_CHECK]
ENABLED = true
ATTRIBUTE = CombankDetails.unifiedUsername
USE_QUOTES = true

[OUTPUT]
OUTPUT_FIELDS = firstname,lastname,loginid,locationid,telno,emailid,sex,profileid,corporateid,category,selfauthorizationlimit,selfauthtransaction,nationalidcardorpassport,identificationtype,uuid,effectivefrom,modifiedby,modifiedon,checkedby,checkedon,Roleid

[SCIM_PAYLOAD]
NATIVE_PASSWORD = admin
PREFERRED_LANGUAGE = SG
CREATED_BY = migrationScript
MFA_CONFIG = {"SMS": true, "EMAIL": true, "SOFT_TOKEN": false, "FIDO": false}

[STATUS_UPDATE]
STATUS_UPDATE_PREFIX = User_Status_Update_
STATUS_UPDATE_EXTENSION = .csv
ALLOWED_STATUS_VALUES = UC,ACT,LCK,ALK,DBLT,DBLP
PATCH_ACCOUNT_STATUS_PATH = CombankDetails:accountStatus