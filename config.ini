[PATHS]
SOURCE_DIR = ./source
DESTINATION_DIR = ./destination
LOG_DIR = ./logs
TRACKER_FILE = ./migration_tracker.csv

[TARGET]
TARGET_HOST = 172.16.148.21
TARGET_PROTOCOL = https
TARGET_PORT = 
CREATE_USER_ENDPOINT = /scim/Users
DELETE_USER_ENDPOINT = /scim/Users

[BATCH]
BATCH_PREFIX = User_Migration_Batch_
BATCH_EXTENSION = .csv

[VALIDATION]
EXPECTED_HEADERS = firstname,lastname,loginid,locationid,telno,corporateusertype,emailid,sex,profileid,corporateid,corporatebranchid,category,ismigrated,moduleaccess,userstype,selfauthorizationlimit,selfauthtransaction,ismaskingrequired,cifnumber,nationalidcardorpassport,identificationtype,uuid,effectivefrom,modifiedby,modifiedon,checkedby,checkedon,Roleid,FullName,isApprovalRequired,accountStatus,lastPasswordChangeOn,isCorpUser,digestedPassword,forcePasswordChange,Remarks,originSystem,noOfOTPAttempts,noOfOtpGenerates,lockedUser,lockedTimestamp,lockedReason

MANDATORY_FIELDS = firstname,lastname,loginid,telno,emailid,ismigrated,cifnumber,nationalidcardorpassport,identificationtype,effectivefrom,modifiedby,modifiedon,isApprovalRequired,accountStatus,lastPasswordChangeOn,isCorpUser,digestedPassword,forcePasswordChange,Remarks,originSystem

TRUE_VALUES = true,yes,1,y
FALSE_VALUES = false,no,0,n

[AUTH]
AUTH_TYPE = BASIC
USERNAME = scimadmin
PASSWORD = Passw0rd

[EXECUTION]
MOCK_MODE = false

[HTTP]
REQUEST_TIMEOUT_SECONDS = 30
VERIFY_SSL = false

[OUTPUT]
OUTPUT_FIELDS = firstname,lastname,loginid,locationid,telno,corporateusertype,emailid,sex,profileid,corporateid,corporatebranchid,category,ismigrated,moduleaccess,userstype,selfauthorizationlimit,selfauthtransaction,ismaskingrequired,cifnumber,nationalidcardorpassport,identificationtype,uuid,effectivefrom,modifiedby,modifiedon,checkedby,checkedon,Roleid

[SCIM_PAYLOAD]
NATIVE_PASSWORD = admin
PREFERRED_LANGUAGE = SG
CREATED_BY = migrationScript
MFA_CONFIG = {"SMS": true, "EMAIL": true, "SOFT_TOKEN": false, "FIDO": false}